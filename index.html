<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DKasirMu</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="config.js"></script>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-3E6H6V22NJ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-3E6H6V22NJ');
    </script>
</head>
<body>
    <h1 id="nama-toko"></h1>
    <h2>DKasirMu</h2>
    <a href="produk.html">⚙️ Kelola Produk</a>
    <a href="riwayat.html">📋 Riwayat Transaksi</a>

    <!--FORM INPUT-->
    <div id="form-input">
        <input type="text" id="namaBarang" placeholder="Nama barang" oninput="cariHarga(); tampilSaran()">
        <div id="saran-produk"></div>
        <input type="number" id="hargaBarang" placeholder="Harga">
        <input type="number" id="qtyBarang" placeholder="Qty" value="1">
        <button onclick="tambahBarang()">Tambah</button>
    </div>

    <!--DAFTAR BELANJA-->
    <div id="daftar-belanja">
        <h3>Daftar Belanja</h3>
        <ul id="listBarang"></ul>
    </div>

    <!--STRUK-->
    <div id="struk">
        <p>Total: <span id="totalHarga">Rp 0</span></p>
        <input type="number" id="uangBayar" placeholder="Uang bayar" oninput="hitungKembalian(); tampilStruk()">
        <p>Kembalian: <span id="kembalian">Rp 0</span></p>
        <button onclick="bayar()">Bayar</button>
        <button onclick="reset()">Reset</button>
        <button onclick="setorModal()">setor Modal</button>
        <button onclick="tutupKasir()">Tutup Kasir</button>
    </div>

    <!--TAMPILAN STRUK-->
    <div id="tampilan-struk" style="display: none">
        <h3>===== DKasirMu =====</h3>
        <p id="struk-waktu"></p>
        <ul id="struk-items"></ul>
        <p><span>Total</span><span id="struk-total"></span></p>
        <p><span>Bayar</span><span id="struk-bayar"></span></p>
        <p><span>Kembalian</span><span id="struk-kembalian"></span></p>
    </div>

    <!--SALDO LACI-->
    <div id="info-laci">
        <p>Saldo Laci: <span id="saldo-laci">Rp 0</span></p>
    </div>

    <script type="module" src="js/kasir.js"></script>
    <script src="main.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log('Service Worker terdaftar'))
                .catch((err) => console.log('Gagal:, err'));
        }
    </script>
    <footer style="text-align:center; padding: 16px; font-size: 0.85em; color: #888;">
        Dibuat oleh <a href="tentang.html">Dhifa Studio</a>
    </footer>
</body>
</html>
